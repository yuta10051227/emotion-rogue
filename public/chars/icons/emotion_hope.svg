<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="hopeStar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#fff8cc"/>
      <stop offset="1" stop-color="#fff3a0"/>
    </linearGradient>
    <linearGradient id="hopeDot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff3a0"/>
    </linearGradient>
  </defs>
  <!-- soft glow -->
  <circle cx="30" cy="31" r="20" fill="#fff3a0" opacity="0.28"/>
  <!-- 4-point sparkle star -->
  <path d="M30 6
           C31.5 20 33 21.5 47 23
           C33 24.5 31.5 26 30 40
           C28.5 26 27 24.5 13 23
           C27 21.5 28.5 20 30 6 Z"
        fill="url(#hopeStar)" stroke="#ffca28" stroke-width="2.3" stroke-linejoin="round"/>
  <!-- small sparkle particle 1 -->
  <path d="M50 40
           C50.7 45 51.3 45.7 56 46.5
           C51.3 47.3 50.7 48 50 53
           C49.3 48 48.7 47.3 44 46.5
           C48.7 45.7 49.3 45 50 40 Z"
        fill="url(#hopeDot)" stroke="#ffca28" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- small sparkle particle 2 -->
  <path d="M15 44
           C15.5 47.5 15.9 48 19 48.6
           C15.9 49.2 15.5 49.7 15 53
           C14.5 49.7 14.1 49.2 11 48.6
           C14.1 48 14.5 47.5 15 44 Z"
        fill="url(#hopeDot)" stroke="#ffca28" stroke-width="1.6" stroke-linejoin="round"/>
</svg>
