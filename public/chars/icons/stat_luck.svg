        fill="url(#luckFill)" stroke="#2e9e4f" stroke-width="2.3" stroke-linejoin="round"/>
  <!-- bottom leaf -->
  <path d="M32 32 C25 42 27 51 32 51 C37 51 39 42 32 32 Z"
        fill="url(#luckFill)" stroke="#2e9e4f" stroke-width="2.3" stroke-linejoin="round"/>
  <!-- center -->
  <circle cx="32" cy="32" r="3" fill="#2e9e4f"/>
  <!-- shines -->
  <path d="M30 16 C28.5 19 28.5 24 30 28 C27 24 27 19 30 16 Z" fill="url(#luckShine)"/>
