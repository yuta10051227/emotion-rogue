<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="tearBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe4ff"/>
      <stop offset="0.45" stop-color="#7bc0ff"/>
      <stop offset="1" stop-color="#4d9fff"/>
    </linearGradient>
  </defs>
  <!-- teardrop: pointed top, round bottom -->
